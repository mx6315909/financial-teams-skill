name: Monitor OpenClaw Updates

on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟检查一次
  workflow_dispatch:  # 允许手动触发

jobs:
  check-updates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Check OpenClaw releases
      id: check
      run: |
        # 获取最新 release 信息
        RELEASE=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest)
        TAG_NAME=$(echo "$RELEASE" | jq -r '.tag_name')
        BODY=$(echo "$RELEASE" | jq -r '.body')
        PUBLISHED_AT=$(echo "$RELEASE" | jq -r '.published_at')
        HTML_URL=$(echo "$RELEASE" | jq -r '.html_url')
        
        echo "Latest tag: $TAG_NAME"
        echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "url=$HTML_URL" >> $GITHUB_OUTPUT
        echo "published=$PUBLISHED_AT" >> $GITHUB_OUTPUT
        
        # 读取上次记录的版本
        if [ -f .last_openclaw_version ]; then
          LAST_TAG=$(cat .last_openclaw_version)
        else
          LAST_TAG=""
        fi
        
        if [ "$TAG_NAME" != "$LAST_TAG" ]; then
          echo "new_release=true" >> $GITHUB_OUTPUT
          echo "$TAG_NAME" > .last_openclaw_version
        else
          echo "new_release=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Translate and Send to WhatsApp
      if: steps.check.outputs.new_release == 'true'
      run: |
        chmod +x scripts/translate_and_notify.sh
        ./scripts/translate_and_notify.sh \
          "${{ steps.check.outputs.tag }}" \
          "${{ steps.check.outputs.body }}" \
          "${{ steps.check.outputs.url }}" \
          "${{ steps.check.outputs.published }}"
          
    - name: Save version state
      if: steps.check.outputs.new_release == 'true'
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add .last_openclaw_version
        git commit -m "Update OpenClaw version tracking: ${{ steps.check.outputs.tag }}" || true
        git push || true
